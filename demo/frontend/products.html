<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Products — ShopVibe</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/css/styles.css" />
  </head>
  <body>
    <!-- Navigation -->
    <nav class="bg-white border-b border-gray-200 sticky top-0 z-40">
      <div
        class="max-w-6xl mx-auto px-6 flex items-center justify-between h-16"
      >
        <a href="/" class="text-xl font-bold text-violet-600">ShopVibe</a>
        <div class="flex items-center gap-8">
          <a
            href="/"
            class="text-sm font-medium text-gray-700 hover:text-violet-600 pb-1"
            >Home</a
          >
          <a
            href="/products.html"
            class="text-sm font-medium text-gray-700 hover:text-violet-600 pb-1"
            >Products</a
          >
          <a
            href="/orders.html"
            class="text-sm font-medium text-gray-700 hover:text-violet-600 pb-1"
            >Orders</a
          >
          <a
            href="/account.html"
            class="text-sm font-medium text-gray-700 hover:text-violet-600 pb-1"
            >Account</a
          >
          <div
            id="nav-user"
            class="flex items-center gap-3 ml-4 pl-4 border-l border-gray-200"
          ></div>
        </div>
      </div>
    </nav>

    <!-- Page Header -->
    <div class="max-w-6xl mx-auto px-6 pt-10 pb-4">
      <h1 class="text-3xl font-bold text-gray-900">All Products</h1>
      <p class="text-gray-500 mt-1">
        Premium tech accessories for your workspace
      </p>
    </div>

    <!-- Product Grid -->
    <section class="max-w-6xl mx-auto px-6 pb-16">
      <div
        class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6"
        id="product-grid"
      >
        <!-- Filled by JS -->
      </div>
    </section>

    <!-- Footer -->
    <footer class="bg-gray-900 text-gray-400 mt-16">
      <div
        class="max-w-6xl mx-auto px-6 py-12 flex flex-col md:flex-row justify-between gap-8"
      >
        <div>
          <span class="text-white font-bold text-lg">ShopVibe</span>
          <p class="mt-2 text-sm">
            Demo e-commerce store for AI support testing.
          </p>
        </div>
        <div class="text-sm space-y-1">
          <div class="text-white font-medium mb-2">Support</div>
          <a
            href="#"
            onclick="openWidgetWithMessage('Hi, I need help')"
            class="block hover:text-white"
            >Live Chat</a
          >
        </div>
      </div>
      <div class="border-t border-gray-800 text-center py-4 text-xs">
        ShopVibe Demo &mdash; not a real store
      </div>
    </footer>

    <!-- Widget -->
    <script
      src="http://localhost:8000/widget/widget.js"
      data-workspace="demo"
      data-api="http://localhost:8000"
      data-customer-email="sarah@example.com"
    ></script>
    <script src="/js/app.js"></script>
    <script>
      fetch("/api/products")
        .then(function (r) {
          return r.json();
        })
        .then(function (data) {
          var grid = document.getElementById("product-grid");
          grid.innerHTML = data.products
            .map(function (p) {
              var stars = "";
              for (var i = 0; i < 5; i++)
                stars += i < Math.round(p.rating) ? "&#9733;" : "&#9734;";
              return (
                '<div class="product-card bg-white rounded-xl border border-gray-200 overflow-hidden">' +
                '<img src="' +
                p.image +
                '" alt="' +
                p.name +
                '" class="w-full h-48 object-cover">' +
                '<div class="p-4">' +
                '<span class="text-xs text-gray-400 uppercase">' +
                p.category +
                "</span>" +
                '<h3 class="font-semibold text-gray-900 mt-1">' +
                p.name +
                "</h3>" +
                '<div class="flex items-center gap-1 my-1"><span class="text-yellow-400 text-sm">' +
                stars +
                '</span><span class="text-gray-400 text-xs">' +
                p.rating +
                "</span></div>" +
                '<div class="flex justify-between items-center mt-2">' +
                '<span class="text-lg font-bold text-violet-600">$' +
                p.price.toFixed(2) +
                "</span>" +
                '<button class="bg-violet-600 text-white px-3 py-1.5 rounded-lg text-sm hover:bg-violet-700">Add to Cart</button>' +
                "</div></div></div>"
              );
            })
            .join("");
        });
    </script>
  </body>
</html>
