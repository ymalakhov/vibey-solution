<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In — ShopVibe</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center">
    <div class="w-full max-w-md px-6">
        <div class="text-center mb-8">
            <a href="/" class="text-3xl font-bold text-violet-600">ShopVibe</a>
            <p class="text-gray-500 mt-2">Sign in to your account</p>
        </div>

        <div class="bg-white rounded-xl border border-gray-200 p-8">
            <form id="login-form" class="space-y-5">
                <div>
                    <label for="email" class="block text-sm font-medium text-gray-700 mb-1">Email address</label>
                    <input type="email" id="email" name="email" required
                        class="w-full px-4 py-2.5 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-violet-500 focus:border-transparent"
                        placeholder="you@example.com">
                </div>
                <div>
                    <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                    <input type="password" id="password" name="password" required
                        class="w-full px-4 py-2.5 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-violet-500 focus:border-transparent"
                        placeholder="Enter your password">
                </div>

                <div id="login-error" class="hidden text-sm text-red-600 bg-red-50 border border-red-200 rounded-lg px-4 py-2.5"></div>

                <button type="submit" id="login-btn"
                    class="w-full bg-violet-600 text-white py-2.5 rounded-lg font-semibold hover:bg-violet-700 transition text-sm">
                    Sign In
                </button>
            </form>
        </div>

        <div class="mt-6 bg-violet-50 border border-violet-200 rounded-xl p-4 text-sm text-violet-800">
            <div class="font-medium mb-1">Demo credentials</div>
            <div class="text-violet-600">Try <strong>sarah@example.com</strong> / <strong>sarah123</strong></div>
        </div>
    </div>

    <script>
        // If already logged in, redirect to home
        var user = localStorage.getItem('shopvibe_user');
        if (user) window.location.href = '/';

        document.getElementById('login-form').addEventListener('submit', function (e) {
            e.preventDefault();
            var errorEl = document.getElementById('login-error');
            var btn = document.getElementById('login-btn');
            errorEl.classList.add('hidden');
            btn.textContent = 'Signing in...';
            btn.disabled = true;

            var email = document.getElementById('email').value.trim();
            var password = document.getElementById('password').value;

            fetch('/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: email, password: password })
            })
            .then(function (r) { return r.json().then(function (d) { return { ok: r.ok, data: d }; }); })
            .then(function (res) {
                if (res.ok && res.data.success) {
                    localStorage.setItem('shopvibe_user', JSON.stringify(res.data.customer));
                    window.location.href = '/';
                } else {
                    errorEl.textContent = res.data.error || 'Invalid email or password';
                    errorEl.classList.remove('hidden');
                    btn.textContent = 'Sign In';
                    btn.disabled = false;
                }
            })
            .catch(function () {
                errorEl.textContent = 'Something went wrong. Please try again.';
                errorEl.classList.remove('hidden');
                btn.textContent = 'Sign In';
                btn.disabled = false;
            });
        });
    </script>
</body>
</html>
